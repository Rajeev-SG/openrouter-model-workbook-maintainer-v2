name: Daily Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      AA_API_KEY: ${{ secrets.AA_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      INFISICAL_DOMAIN: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
      INFISICAL_ENV_SLUG: ${{ vars.INFISICAL_ENV_SLUG || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Validate secret source
        env:
          INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          if [ -n "${AA_API_KEY}" ]; then
            echo "Using GitHub Actions secrets for runtime API keys."
            exit 0
          fi

          missing=0
          for name in INFISICAL_IDENTITY_ID INFISICAL_PROJECT_SLUG; do
            if [ -z "${!name}" ]; then
              echo "::error::$name GitHub variable is required when AA_API_KEY is not provided as a repository secret."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Fetch secrets from Infisical
        if: ${{ env.AA_API_KEY == '' }}
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: "oidc"
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          domain: ${{ env.INFISICAL_DOMAIN }}

      - name: Refresh
        run: |
          set -o pipefail
          refresh_log="$(mktemp)"
          if make refresh 2>&1 | tee "$refresh_log"; then
            exit 0
          fi
          if grep -Fq "429 Client Error: Too Many Requests" "$refresh_log"; then
            echo "::warning::Artificial Analysis rate limited the refresh. Rebuilding from checked-in datasets instead."
            make rebuild-from-data
            exit 0
          fi
          exit 1

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-intelligence-workbook
          path: out/openrouter_model_pricing_performance.xlsx

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-intelligence-data
          path: data/latest

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
