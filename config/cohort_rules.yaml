version: 2
description: >
  The primary live guide cohort requires strong routed-pricing and benchmark coverage from
  OpenRouter plus Artificial Analysis. Vals and LiveBench are tracked as enrichment layers:
  models with Vals or LiveBench receive explicit badges and qualify for stricter benchmark subsets,
  but missing enrichment data does not exclude otherwise useful OpenRouter + AA models from the
  live recommendation surface.
required_sources:
  - openrouter
  - artificial_analysis
required_metrics:
  - openrouter_input_price_per_million
  - openrouter_output_price_per_million
  - openrouter_context_tokens
strict_required_sources:
  - openrouter
  - artificial_analysis
  - vals
strict_required_metrics:
  - openrouter_input_price_per_million
  - openrouter_output_price_per_million
  - openrouter_context_tokens
  - aa_intelligence_index
  - aa_coding_index
  - aa_median_tokens_per_second
  - vals_accuracy
  - vals_latency_seconds
  - vals_cost_per_test
preferred_sources:
  - vals
  - livebench
